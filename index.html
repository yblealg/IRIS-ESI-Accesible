<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS - Interfaz de Respuesta Integral y Sensorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body role="application" aria-label="IRIS: Estrategia Pedagógica de Educación Sexual Integral">

    <header role="banner">
       <img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Logotipo_de_la_UNAD.png" alt="Logo UNAD" id="logo-unad">
        
        <h1 id="logo-iris">I.R.I.S.</h1>
        <p class="acronimo">Interfaz de Respuesta Integral y Sensorial</p>
        <p class="eslogan"><em>Tu voz, tus derechos, tu autonomía.</em></p>
    </header>

    <main id="contenedor-principal" role="main">
        
        <div id="avatar-robot-contenedor">
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" id="robot-avatar" alt="Asistente Virtual IRIS" class="robot-reposo">
        </div>

        <section id="pantalla-interactiva" aria-live="polite">
            <div id="cuadro-texto">
                <p id="texto-dinamico">Presiona el botón, cualquier tecla o toca la pantalla para iniciar.</p>
            </div>
        </section>

        <nav id="controles">
            <button id="btn-iniciar" onclick="iniciarSistema()">ACTIVAR IRIS</button>
        </nav>
    </main>

    <footer role="contentinfo">
        <p>Estrategia Pedagógica Accesible - Tarea 3 UNAD | Estudiante: Yair Bernardo Leal Guerra</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
